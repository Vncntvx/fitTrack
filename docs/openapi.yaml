      tags:
        - 导入导出
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 完整数据
      responses:
        '200':
          description: 导入成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  # ==================== 安全方案 ====================
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer Token 认证
    tokenHeader:
      type: apiKey
      in: header
      name: X-FitTrack-Token
      description: 自定义 Token 请求头
    tokenQuery:
      type: apiKey
      in: query
      name: token
      description: URL Token 参数

  # ==================== 响应定义 ====================
  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ==================== 数据模型 ====================
  schemas:
    # ----- 基础响应 -----
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        timestamp:
          type: string
          format: date-time
          example: '2024-01-15T08:30:00.000Z'

    SuccessResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: 'Updated successfully'

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: 'Invalid ID'
        hint:
          type: string
          example: 'Use Authorization: Bearer <token> or ?token=<token>'

    CreateResponse:
      type: object
      required:
        - id
        - message
      properties:
        id:
          type: integer
          example: 1
        message:
          type: string
          example: 'Created successfully'

    # ----- 训练记录 -----
    TrainingSession:
      type: object
      required:
        - id
        - datetime
        - type
        - durationMinutes
        - intensity
        - isGoalCompleted
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        datetime:
          type: string
          format: date-time
        type:
          type: string
          enum: [strength, running, swimming, cycling, jump_rope, walking, yoga, stretching, custom]
        durationMinutes:
          type: integer
          minimum: 1
        intensity:
          type: string
          enum: [light, moderate, high]
        note:
          type: string
          nullable: true
        isGoalCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTrainingSessionRequest:
      type: object
      required:
        - datetime
        - type
        - durationMinutes
        - intensity
      properties:
        datetime:
          type: string
          format: date-time
        type:
          type: string
          enum: [strength, running, swimming, cycling, jump_rope, walking, yoga, stretching, custom]
        durationMinutes:
          type: integer
          minimum: 1
        intensity:
          type: string
          enum: [light, moderate, high]
        note:
          type: string
        isGoalCompleted:
          type: boolean
          default: false

    UpdateTrainingSessionRequest:
      type: object
      properties:
        datetime:
          type: string
          format: date-time
        type:
          type: string
          enum: [strength, running, swimming, cycling, jump_rope, walking, yoga, stretching, custom]
        durationMinutes:
          type: integer
          minimum: 1
        intensity:
          type: string
          enum: [light, moderate, high]
        note:
          type: string
        isGoalCompleted:
          type: boolean

    TrainingStats:
      type: object
      properties:
        workoutDaysThisWeek:
          type: integer
        totalMinutesThisWeek:
          type: integer
        currentStreak:
          type: integer
        mostFrequentType:
          type: string
          nullable: true
        weeklyCount:
          type: integer
        totalMinutes:
          type: integer
        weeklyMinutes:
          type: integer
        totalWorkouts:
          type: integer
        avgIntensity:
          type: string

    # ----- 动作库 -----
    Exercise:
      type: object
      required:
        - id
        - name
        - category
        - movementType
        - isCustom
        - isEnabled
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [chest, back, shoulders, arms, legs, core, full_body, cardio]
        movementType:
          type: string
          enum: [compound, isolation]
        primaryMuscles:
          type: string
          nullable: true
        secondaryMuscles:
          type: string
          nullable: true
        defaultSets:
          type: integer
        defaultReps:
          type: integer
        defaultWeight:
          type: number
          nullable: true
        isCustom:
          type: boolean
        isEnabled:
          type: boolean
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateExerciseRequest:
      type: object
      required:
        - name
        - category
      properties:
        name:
          type: string
        category:
          type: string
          enum: [chest, back, shoulders, arms, legs, core, full_body, cardio]
        movementType:
          type: string
          enum: [compound, isolation]
          default: compound
        primaryMuscles:
          type: string
        secondaryMuscles:
          type: string
        defaultSets:
          type: integer
          default: 3
        defaultReps:
          type: integer
          default: 10
        defaultWeight:
          type: number
        description:
          type: string

    UpdateExerciseRequest:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
          enum: [chest, back, shoulders, arms, legs, core, full_body, cardio]
        movementType:
          type: string
          enum: [compound, isolation]
        primaryMuscles:
          type: string
        secondaryMuscles:
          type: string
        defaultSets:
          type: integer
        defaultReps:
          type: integer
        defaultWeight:
          type: number
        isEnabled:
          type: boolean
        description:
          type: string

    ImportExercisesRequest:
      type: object
      required:
        - exercises
      properties:
        exercises:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              category:
                type: string
              movementType:
                type: string
              primaryMuscles:
                type: string
              secondaryMuscles:
                type: string
              defaultSets:
                type: integer
              defaultReps:
                type: integer
              defaultWeight:
                type: number
              description:
                type: string

    ExportExercisesResponse:
      type: object
      properties:
        exportDate:
          type: string
          format: date-time
        count:
          type: integer
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/Exercise'

    # ----- 训练模板 -----
    WorkoutTemplate:
      type: object
      required:
        - id
        - name
        - type
        - isDefault
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [strength, running, swimming]
        description:
          type: string
          nullable: true
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TemplateDetail:
      type: object
      properties:
        template:
          $ref: '#/components/schemas/WorkoutTemplate'
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/TemplateExercise'

    TemplateExercise:
      type: object
      required:
        - id
        - templateId
        - exerciseName
        - sets
        - reps
        - sortOrder
      properties:
        id:
          type: integer
        templateId:
          type: integer
        exerciseId:
          type: integer
          nullable: true
        exerciseName:
          type: string
        sets:
          type: integer
        reps:
          type: integer
        weight:
          type: number
          nullable: true
        sortOrder:
          type: integer

    CreateTemplateRequest:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
          enum: [strength, running, swimming]
        description:
          type: string
        isDefault:
          type: boolean
          default: false
        exercises:
          type: array
          items:
            type: object
            properties:
              exerciseId:
                type: integer
              exerciseName:
                type: string
              sets:
                type: integer
                default: 3
              reps:
                type: integer
                default: 10
              weight:
                type: number

    UpdateTemplateRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [strength, running, swimming]
        description:
          type: string
        isDefault:
          type: boolean

    AddTemplateExerciseRequest:
      type: object
      required:
        - exerciseName
      properties:
        exerciseId:
          type: integer
        exerciseName:
          type: string
        sets:
          type: integer
          default: 3
        reps:
          type: integer
          default: 10
        weight:
          type: number
        sortOrder:
          type: integer
          default: 0

    # ----- 个人记录 -----
    PersonalRecord:
      type: object
      required:
        - id
        - recordType
        - value
        - unit
        - achievedAt
      properties:
        id:
          type: integer
        recordType:
          type: string
          enum: [strength_1rm, strength_volume, running_distance, running_pace, swimming_distance]
        exerciseId:
          type: integer
          nullable: true
        value:
          type: number
        unit:
          type: string
          enum: [kg, meters, seconds]
        achievedAt:
          type: string
          format: date-time
        sessionId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ----- 跑步记录 -----
    RunningEntry:
      type: object
      required:
        - id
        - sessionId
        - runType
        - distanceMeters
        - durationSeconds
        - avgPaceSeconds
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        runType:
          type: string
          enum: [easy, tempo, interval, lsd, recovery, race]
        distanceMeters:
          type: number
        durationSeconds:
          type: integer
        avgPaceSeconds:
          type: integer
        bestPaceSeconds:
          type: integer
          nullable: true
        avgHeartRate:
          type: integer
          nullable: true
        maxHeartRate:
          type: integer
          nullable: true
        avgCadence:
          type: integer
          nullable: true
        maxCadence:
          type: integer
          nullable: true
        elevationGain:
          type: number
          nullable: true
        elevationLoss:
          type: number
          nullable: true
        footwear:
          type: string
          nullable: true
        weatherJson:
          type: string
          nullable: true

    RunningSplit:
      type: object
      required:
        - id
        - runningEntryId
        - splitNumber
        - distanceMeters
        - durationSeconds
        - paceSeconds
      properties:
        id:
          type: integer
        runningEntryId:
          type: integer
        splitNumber:
          type: integer
        distanceMeters:
          type: number
        durationSeconds:
          type: integer
        paceSeconds:
          type: integer
        avgHeartRate:
          type: integer
          nullable: true
        cadence:
          type: integer
          nullable: true
        elevationGain:
          type: number
          nullable: true
        isManual:
          type: boolean

    RunningStats:
      type: object
      properties:
        totalRuns:
          type: integer
        totalDistanceMeters:
          type: number
        totalDurationSeconds:
          type: integer
        weeklyDistanceMeters:
          type: number
        monthlyDistanceMeters:
          type: number

    # ----- 游泳记录 -----
    SwimmingEntry:
      type: object
      required:
        - id
        - sessionId
        - environment
        - primaryStroke
        - distanceMeters
        - durationSeconds
        - pacePer100m
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        environment:
          type: string
          enum: [pool, open_water]
        poolLengthMeters:
          type: integer
          nullable: true
        primaryStroke:
          type: string
          enum: [freestyle, breaststroke, backstroke, butterfly, mixed]
        distanceMeters:
          type: number
        durationSeconds:
          type: integer
        pacePer100m:
          type: integer
        trainingType:
          type: string
          enum: [technique, endurance, speed, recovery]
          nullable: true
        equipment:
          type: string
          nullable: true

    SwimmingSet:
      type: object
      required:
        - id
        - swimmingEntryId
        - setType
        - distanceMeters
        - durationSeconds
        - sortOrder
      properties:
        id:
          type: integer
        swimmingEntryId:
          type: integer
        setType:
          type: string
          enum: [warmup, main, cooldown]
        description:
          type: string
          nullable: true
        distanceMeters:
          type: number
        durationSeconds:
          type: integer
        sortOrder:
          type: integer

    SwimmingStats:
      type: object
      properties:
        totalSwims:
          type: integer
        totalDistanceMeters:
          type: number
        totalDurationSeconds:
          type: integer
        weeklyDistanceMeters:
          type: number
        monthlyDistanceMeters:
          type: number

    # ----- 力量训练 -----
    StrengthEntry:
      type: object
      required:
        - id
        - sessionId
        - exerciseName
        - sets
        - defaultReps
        - isWarmup
        - sortOrder
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        exerciseId:
          type: integer
          nullable: true
        exerciseName:
          type: string
        sets:
          type: integer
        defaultReps:
          type: integer
        defaultWeight:
          type: number
          nullable: true
        repsPerSet:
          type: string
          nullable: true
          description: JSON 数组字符串，如 "[10, 8, 6]"
        weightPerSet:
          type: string
          nullable: true
          description: JSON 数组字符串，如 "[60.0, 65.0, 70.0]"
        setCompleted:
          type: string
          nullable: true
          description: JSON 数组字符串，如 "[true, true, false]"
        isWarmup:
          type: boolean
        rpe:
          type: integer
          nullable: true
          minimum: 1
          maximum: 10
        restSeconds:
          type: integer
          nullable: true
        sortOrder:
          type: integer
        note:
          type: string
          nullable: true

    CreateStrengthEntryRequest:
      type: object
      required:
        - exerciseName
      properties:
        exerciseId:
          type: integer
        exerciseName:
          type: string
        sets:
          type: integer
          default: 3
        defaultReps:
          type: integer
          default: 10
        defaultWeight:
          type: number
