openapi: 3.1.0
info:
  title: FitTrack LAN API
  description: |
    FitTrack 运动追踪应用局域网 HTTP API。Android 设备作为服务器端，向 Web 端提供 RESTful API 接口用于访问和管理运动数据。

    ## 认证
    API 支持可选的令牌认证。当配置了访问令牌后，所有 `/api/*` 路径需要认证。

    支持三种认证方式（优先级从高到低）：
    1. `Authorization: Bearer <token>` 请求头
    2. `X-FitTrack-Token: <token>` 自定义请求头
    3. `?token=<token>` URL 查询参数

    ## 跨域支持
    API 自动包含 CORS 响应头，支持浏览器跨域访问。
  version: 1.0.0
  contact:
    name: FitTrack Team
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://{host}:{port}
    description: 局域网服务器
    variables:
      host:
        default: 192.168.1.100
        description: Android 设备 IP 地址
      port:
        default: '8080'
        description: 服务端口号

security:
  - bearerAuth: []
  - tokenHeader: []
  - tokenQuery: []

paths:
  # ==================== 系统接口 ====================
  /health:
    get:
      summary: 健康检查
      description: 检查服务器运行状态，无需认证
      security: []
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ==================== 训练记录接口 ====================
  /api/workouts:
    get:
      summary: 获取所有训练记录
      description: 获取所有训练会话列表
      tags:
        - 训练记录
      responses:
        '200':
          description: 成功获取训练记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainingSession'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: 创建训练记录
      description: 创建新的训练会话
      tags:
        - 训练记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrainingSessionRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/workouts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: 训练记录 ID

    get:
      summary: 获取单个训练记录
      description: 获取指定 ID 的训练记录详情
      tags:
        - 训练记录
      responses:
        '200':
          description: 成功获取训练记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      summary: 更新训练记录
      description: 更新指定 ID 的训练记录
      tags:
        - 训练记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrainingSessionRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      summary: 删除训练记录
      description: 删除指定 ID 的训练记录（级联删除关联详情）
      tags:
        - 训练记录
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/stats:
    get:
      summary: 获取训练统计
      description: 获取训练统计数据
      tags:
        - 训练记录
      responses:
        '200':
          description: 成功获取统计数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingStats'
        '500':
          $ref: '#/components/responses/InternalError'

  # ==================== 动作库接口 ====================
  /api/exercises:
    get:
      summary: 获取所有动作
      description: 获取动作库列表，支持按分类过滤
      tags:
        - 动作库
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [chest, back, shoulders, arms, legs, core, full_body, cardio]
          description: 动作分类过滤
      responses:
        '200':
          description: 成功获取动作列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Exercise'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: 创建动作
      description: 创建新动作到动作库
      tags:
        - 动作库
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExerciseRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/exercises/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: 动作 ID

    get:
      summary: 获取单个动作
      description: 获取指定 ID 的动作详情
      tags:
        - 动作库
      responses:
        '200':
          description: 成功获取动作
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      summary: 更新动作
      description: 更新指定 ID 的动作
      tags:
        - 动作库
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExerciseRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      summary: 删除动作
      description: 删除指定 ID 的动作
      tags:
        - 动作库
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: 动作存在引用无法删除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/exercises/bulk-delete:
    post:
      summary: 批量删除动作
      description: 批量删除多个动作
      tags:
        - 动作库
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteRequest'
      responses:
        '200':
          description: 批量删除完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/exercises/import:
    post:
      summary: 导入动作
      description: 从 JSON 导入动作
      tags:
        - 动作库
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportExercisesRequest'
      responses:
        '200':
          description: 导入完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/exercises/export:
    get:
      summary: 导出动作
      description: 导出所有动作为 JSON
      tags:
        - 动作库
      responses:
        '200':
          description: 成功导出
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportExercisesResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  # ==================== 训练模板接口 ====================
  /api/templates:
    get:
      summary: 获取所有模板
      description: 获取训练模板列表
      tags:
        - 训练模板
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [strength, running, swimming]
          description: 模板类型过滤
      responses:
        '200':
          description: 成功获取模板列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutTemplate'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: 创建模板
      description: 创建新的训练模板
      tags:
        - 训练模板
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: 模板 ID

    get:
      summary: 获取模板详情
      description: 获取指定 ID 的模板详情（包含动作列表）
      tags:
        - 训练模板
      responses:
        '200':
          description: 成功获取模板详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      summary: 更新模板
      description: 更新指定 ID 的模板
      tags:
        - 训练模板
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      summary: 删除模板
      description: 删除指定 ID 的模板
      tags:
        - 训练模板
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/templates/{id}/exercises:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: 模板 ID

    post:
      summary: 添加模板动作
      description: 向模板添加动作
      tags:
        - 训练模板
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTemplateExerciseRequest'
      responses:
        '200':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/templates/exercises/{exerciseId}:
    parameters:
      - name: exerciseId
        in: path
        required: true
        schema:
          type: integer
        description: 模板动作 ID

    delete:
      summary: 删除模板动作
      description: 从模板中删除动作
      tags:
        - 训练模板
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  # ==================== 个人记录接口 ====================
  /api/pr:
    get:
      summary: 获取所有 PR
      description: 获取所有个人记录
      tags:
        - 个人记录
      responses:
        '200':
          description: 成功获取 PR 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonalRecord'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/pr/{type}:
    parameters:
      - name: type
        in: path
        required: true
        schema:
          type: string
          enum: [strength_1rm, strength_volume, running_distance, running_pace, swimming_distance]
        description: 记录类型

    get:
      summary: 按类型获取 PR
      description: 获取指定类型的个人记录
      tags:
        - 个人记录
      responses:
        '200':
          description: 成功获取 PR 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonalRecord'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/pr/exercise/{exerciseId}:
    parameters:
      - name: exerciseId
        in: path
        required: true
        schema:
          type: integer
        description: 动作 ID

    get:
      summary: 获取动作 PR 历史
      description: 获取指定动作的 PR 历史记录
      tags:
        - 个人记录
      responses:
        '200':
          description: 成功获取 PR 历史
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonalRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/pr/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: PR ID

    delete:
      summary: 删除 PR
      description: PR 是派生数据，禁止直接删除
      tags:
        - 个人记录
      responses:
        '400':
          description: 禁止删除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== 跑步记录接口 ====================
  /api/running:
    get:
      summary: 获取所有跑步记录
      description: 获取所有跑步训练记录
      tags:
        - 跑步记录
      responses:
        '200':
          description: 成功获取跑步记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunningEntry'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/running/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: 跑步记录 ID

    get:
      summary: 获取单个跑步记录
      description: 获取指定 ID 的跑步记录
      tags:
        - 跑步记录
      responses:
        '200':
          description: 成功获取跑步记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunningEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/running/{id}/splits:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: 跑步记录 ID

    get:
      summary: 获取跑步分段
      description: 获取指定跑步记录的分段数据
      tags:
        - 跑步记录
      responses:
        '200':
          description: 成功获取分段数据
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunningSplit'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/running/stats:
    get:
      summary: 获取跑步统计
      description: 获取跑步统计数据
      tags:
        - 跑步记录
      responses:
        '200':
          description: 成功获取统计数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunningStats'
        '500':
          $ref: '#/components/responses/InternalError'

  # ==================== 游泳记录接口 ====================
  /api/swimming:
    get:
      summary: 获取所有游泳记录
      description: 获取所有游泳训练记录
      tags:
        - 游泳记录
      responses:
        '200':
          description: 成功获取游泳记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SwimmingEntry'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/swimming/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: 游泳记录 ID

    get:
      summary: 获取单个游泳记录
      description: 获取指定 ID 的游泳记录
      tags:
        - 游泳记录
      responses:
        '200':
          description: 成功获取游泳记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwimmingEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/swimming/{id}/sets:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: 游泳记录 ID

    get:
      summary: 获取游泳分组
      description: 获取指定游泳记录的分组数据
      tags:
        - 游泳记录
      responses:
        '200':
          description: 成功获取分组数据
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SwimmingSet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/swimming/stats:
    get:
      summary: 获取游泳统计
      description: 获取游泳统计数据
      tags:
        - 游泳记录
      responses:
        '200':
          description: 成功获取统计数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwimmingStats'
        '500':
          $ref: '#/components/responses/InternalError'

  # ==================== 力量训练接口 ====================
  /api/strength/{sessionId}:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: integer
        description: 训练会话 ID

    get:
      summary: 获取力量训练详情
      description: 获取指定会话的力量训练详情
      tags:
        - 力量训练
      responses:
        '200':
          description: 成功获取力量训练详情
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrengthEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: 添加力量训练动作
      description: 向指定会话添加力量训练动作
      tags:
        - 力量训练
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStrengthEntryRequest'
      responses:
        '200':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/strength/entry/{entryId}:
    parameters:
      - name: entryId
        in: path
        required: true
        schema:
          type: integer
        description: 力量训练条目 ID

    put:
      summary: 更新力量训练动作
      description: 更新指定 ID 的力量训练动作
      tags:
        - 力量训练
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStrengthEntryRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
